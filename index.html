<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEM Drawer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="map"></div>
    <canvas id="heightmap-canvas"></canvas>

    <aside id="panel">
      <header>
        <h1>DEM Drawer</h1>
      </header>

      <section class="group">
        <label>Basemap</label>
        <select id="basemap-select"></select>
        <div class="row">
          <label>Opacity</label>
          <input id="basemap-opacity" type="range" min="0" max="1" step="0.05" value="0.5" />
        </div>
        <details>
          <summary>Custom basemap</summary>
          <select id="custom-type">
            <option value="raster">Raster XYZ</option>
            <option value="vector">Vector style URL</option>
          </select>
          <input id="custom-url" type="text" placeholder="https://…/{z}/{x}/{y}.png  or  https://…/style.json" />
          <button id="custom-apply">Use</button>
        </details>
      </section>

      <section class="group">
        <label>Canvas extent</label>
        <div class="row">
          <button id="draw-bbox">Draw bbox</button>
          <button id="clear-bbox" class="ghost">Clear</button>
        </div>
        <div class="row">
          <label>m/px</label>
          <input id="mpp" type="number" min="1" max="500" step="1" value="20" />
        </div>
        <div class="muted" id="extent-info">No extent set</div>
      </section>

      <section class="group">
        <label>Brush</label>
        <div class="row">
          <button id="paint-toggle" class="primary" style="flex:1;">Enter paint mode</button>
        </div>
        <div class="muted" style="margin:4px 0 6px;">In paint mode, drag paints. Toggle off to pan/zoom.</div>
        <div class="row">
          <select id="brush-mode">
            <option value="raise">Raise</option>
            <option value="lower">Lower</option>
            <option value="smooth">Smooth</option>
            <option value="flatten">Flatten to value</option>
            <option value="noise">Noise (Perlin)</option>
          </select>
        </div>
        <div class="row">
          <label>Radius (m)</label>
          <input id="brush-radius" type="number" min="1" step="1" value="500" />
        </div>
        <div class="row">
          <label>Strength (m)</label>
          <input id="brush-strength" type="number" step="0.5" value="5" />
        </div>
        <div class="row">
          <label>Hardness</label>
          <input id="brush-hardness" type="range" min="0" max="1" step="0.05" value="0.5" />
        </div>
        <div class="row" id="flatten-row" style="display:none;">
          <label>Target (m)</label>
          <input id="brush-target" type="number" step="1" value="100" />
        </div>
        <div id="noise-rows" style="display:none;">
          <div class="row">
            <label>Feature size (m)</label>
            <input id="brush-noise-feature" type="number" min="1" step="10" value="500" />
          </div>
          <div class="row">
            <label>Octaves</label>
            <input id="brush-noise-octaves" type="number" min="1" max="8" step="1" value="4" />
          </div>
        </div>
      </section>

      <section class="group">
        <label>DEM display</label>
        <div class="row">
          <label>Mode</label>
          <select id="display-mode">
            <option value="ramp">Color ramp</option>
            <option value="hillshade">Hillshade</option>
            <option value="shaded">Shaded relief (ramp + hillshade)</option>
          </select>
        </div>
        <div class="row">
          <label>Opacity</label>
          <input id="overlay-opacity" type="range" min="0" max="1" step="0.05" value="1.0" />
        </div>
        <details id="sun-controls">
          <summary>Sun &amp; relief</summary>
          <div class="row">
            <label>Azimuth °</label>
            <input id="sun-azimuth" type="range" min="0" max="360" step="1" value="315" />
            <span class="muted" id="sun-azimuth-val">315</span>
          </div>
          <div class="row">
            <label>Altitude °</label>
            <input id="sun-altitude" type="range" min="1" max="89" step="1" value="45" />
            <span class="muted" id="sun-altitude-val">45</span>
          </div>
          <div class="row">
            <label>Z exag.</label>
            <input id="sun-zfactor" type="number" min="0.1" step="0.1" value="1" />
          </div>
        </details>
        <div class="muted" id="stats">—</div>
      </section>

      <section class="group">
        <label>Control points (IDW)</label>
        <div class="row">
          <button id="cp-toggle" style="flex:1;">Place control points</button>
          <button id="cp-clear" class="ghost">Clear</button>
        </div>
        <div class="muted" style="margin:4px 0;">In place mode, click on the map and enter an elevation (meters).</div>
        <div class="row">
          <label>Power</label>
          <input id="cp-power" type="number" min="1" max="6" step="0.5" value="2" />
          <button id="cp-generate">Generate</button>
        </div>
        <div id="cp-list" style="margin-top:6px; max-height:120px; overflow-y:auto;"></div>
      </section>

      <section class="group">
        <label>3D terrain</label>
        <div class="row">
          <button id="terrain-toggle" style="flex:1;">Enable 3D</button>
        </div>
        <div class="row">
          <label>Exaggeration</label>
          <input id="terrain-exag" type="range" min="0.5" max="10" step="0.1" value="2.0" />
        </div>
        <div class="row">
          <label>Pitch</label>
          <input id="map-pitch" type="range" min="0" max="80" step="1" value="0" />
        </div>
        <div class="muted">Tip: hold <kbd>Ctrl</kbd> and drag to pitch/rotate the map.</div>
      </section>

      <section class="group">
        <label>Export</label>
        <div class="row">
          <label>Smoothing</label>
          <input id="export-smooth" type="number" min="0" max="20" step="1" value="2" style="flex:1;" />
          <span class="muted">passes</span>
        </div>
        <div class="row">
          <label style="flex:1;"><input id="export-nodata" type="checkbox" checked /> Unpainted → NoData</label>
        </div>
        <div class="row">
          <label>NoData value</label>
          <input id="export-nodata-value" type="number" step="1" value="-9999" />
        </div>
        <button id="export-btn" class="primary">Export Float32 GeoTIFF</button>
        <button id="export-int16-btn">Export Int16 GeoTIFF (grayscale DEM)</button>
        <button id="export-png-btn">Export grayscale PNG</button>
        <button id="reset-btn" class="ghost">Reset heightmap</button>
      </section>
    </aside>

    <div id="cursor-readout" class="hidden"></div>
    <div id="brush-cursor" class="hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
